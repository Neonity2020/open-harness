name: GitHub Releases

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - id: notes
        run: node scripts/release/prepare-github-release.mjs "$GITHUB_REF_NAME" "$RUNNER_TEMP/release-notes.md"

      - if: steps.notes.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub Release already exists for $GITHUB_REF_NAME"
            exit 0
          fi

          gh release create "$GITHUB_REF_NAME" \
            --title "${{ steps.notes.outputs.title }}" \
            --notes-file "$RUNNER_TEMP/release-notes.md"
